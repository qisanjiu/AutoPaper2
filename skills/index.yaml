  description: AutoPaper2 Module 4 (Deep Analysis) 全流程执行 Skill。 当用户需要进入深度分析阶段时触发，包括：
    前置检查 (M3 完成状态) → M4S01 Post-Experiment Audit & Findings Consolidation → M4S02
    Deep Analysis Experiment Design → M4S03 Deep Analysis Experiment Execution → M4S04
    Analysis Results Integration & Evidence Packaging → Gate G4（Logic + Evidence +
    Novelty Critic）→ Handoff M4→M5。 仅在用户明确指定进入 M4 或 M3 完成后建议进入 M4 时触发。
- name: AutoPaper2_m5_writing
  path: skills/AutoPaper2_m5_writing/SKILL.md
  mirror_path: .claude/skills/AutoPaper2_m5_writing/SKILL.md
  skill_role: stage
  argument_hint:
  - 现有项目路径或项目名称
  description: AutoPaper2 Module 5 (Writing & Finalization) 全流程执行 Skill。 当用户需要进入论文写作与定稿阶段时触发，包括：
    前置检查 (M4 完成状态) → M5S01 Pre-Write Audit → M5S02 Paper Outline → M5S04 Methodology
    → M5S05 Experiments & Results → M5S06 Analysis & Discussion → M5S03 Introduction
    & Related Work → M5S07 Abstract & Conclusion → M5S08 Full Draft Assembly & Compilation
    → M5S09 Full-Polish & Narrative Coherence Review → Gate G5（Logic + Writing + Evidence
    + Novelty + Ethics Critic） → 可选 Peer Review Simulation → Handoff M5→投稿/归档。 M5S01
    还会筛选高水平相近论文作为风格参照；M5S02 负责蒸馏出 Style & Layout Profile 和 Figure Style Profile。 每个
    Stage 完成后必须先通过对应 stage reviewer，再推进到下一个 Stage。 仅在用户明确指定进入 M5 或 M4 完成后建议进入 M5 时触发。
- name: AutoPaper2_m6_submission_review
  path: skills/AutoPaper2_m6_submission_review/SKILL.md
  mirror_path: .claude/skills/AutoPaper2_m6_submission_review/SKILL.md
  skill_role: stage
  argument_hint:
  - 现有项目路径或项目名称
  description: AutoPaper2 Module 6 (Submission Review & Revision Loop) 全流程执行 Skill。
    当用户需要进入最终审稿与回溯修正阶段时触发，包括： 前置检查 (M5 完成状态) → M6S01 投稿前审计与包组装 → M6S01 内部严审（多 reviewer，≥8/10
    且 High 未解决项为 0） → M6S02 外部审稿提交 (paperreview.ai) → M6S03 审稿意见接收与解析 (IMAP 邮箱监控)
    → M6S04 回溯规划与 Rebuttal 策略 → M6S05 修订执行 (跨模块回溯) → M6S06 修订验证与完成判定 → Gate G6（Logic
    + Evidence + Writing + Resolution Critic） → Handoff M6→归档/投稿。 仅在用户明确指定进入 M6 或
    M5 完成后建议进入 M6 时触发。
