  description: AutoPaper2 Module 2 (Method Design) 全流程执行 Skill。 当用户需要进入方法设计阶段时触发，包括：
    前置检查 (M1 完成状态) → M2S01 Cross-Domain Search → M2S02 Migration Analysis → M2S03
    Method Architecture Design → M2S04 Algorithm & Theory Design → M2S05 Experiment
    Setup / Metric Protocol / M2→M3 Handoff → Gate G2（Logic + Method + Novelty Critic）。
    仅在用户明确指定进入 M2 或 M1 完成后建议进入 M2 时触发。
- name: AutoPaper2_m3_experiment
  path: skills/AutoPaper2_m3_experiment/SKILL.md
  mirror_path: .claude/skills/AutoPaper2_m3_experiment/SKILL.md
