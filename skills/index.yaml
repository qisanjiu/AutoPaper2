  skill_role: stage
  argument_hint:
  - 研究主题或现有项目路径
  description: AutoPaper2 Module 1 (Domain Survey) 全流程执行 Skill。 当用户需要开始一个新的研究项目的领域调研阶段时触发，包括：
    创建新项目 → M1S01 Topic Scoping → M1S02 3-Round 迭代搜索（含 Survey Review） → Gate G1（Coverage
    + Logic Critic）→ M1S03-M1S05 Ideation → Handoff M1→M2。 默认行为是创建新项目；仅在用户明确指定进入现有项目时复用已有项目。
- name: AutoPaper2_m2_method_design
  path: skills/AutoPaper2_m2_method_design/SKILL.md
