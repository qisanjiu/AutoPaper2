    & Environment Review / Setup → M3S03 Baseline Result Review → M3S04 Main Experiment
    Result Review → M3S05 Result Validation Review & Evidence Packaging → Gate G3（Method
    + Evidence Critic）→ Handoff M3→M4。 仅在用户明确指定进入 M3 或 M2 完成后建议进入 M3 时触发。
- name: AutoPaper2_m4_deep_analysis
  path: skills/AutoPaper2_m4_deep_analysis/SKILL.md
