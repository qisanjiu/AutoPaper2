# AutoPaper2 — Figure / Diagram Generation Defaults
#
# Public defaults only. Local secrets can be placed in
# `config/image_generation.local.yaml`, which is ignored by git.
# Venue-specific figure style presets live in `config/figure_style_profiles.yaml`.

figure_generation:
  default_backend: image2  # image2 | drawio
  fallback_backend: drawio  # used when backend=auto and image2 is not configured
  output_dir: generated-images

  image2:
    model: gpt-image-2
    # If empty, fall back to OPENAI_BASE_URL or the Codex provider config.
    api_base_url: ""
    api_key_env: OPENAI_API_KEY
    size: 1024x1024
    quality: medium

  drawio:
    mode: mcp
    mcp_server: drawio
    output_dir: generated-images
    editable_ext: .drawio
    export_ext: .svg
    # Shell command template for Draw.io MCP automation.
    # Available placeholders: {prompt}, {output}, {output_dir}, {mcp_server}
    # The placeholders are shell-escaped before substitution.
    #
    # Example (Claude Code MCP):
    #   mcp_command: "mcp {mcp_server} generate-diagram --prompt {prompt} --output {output}"
    #
    # Example (custom script):
    #   mcp_command: "python /path/to/drawio_mcp.py --prompt {prompt} --out {output}"
    #
    # If left empty, the drawio backend will fail with an error instead of
    # producing a placeholder stub.
    mcp_command: ""
